<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비트코인 거래소 - 커뮤니티</title>
    <!-- 폰트 및 아이콘 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter Tight:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- 스타일시트 -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/board.css">
</head>
<body>
    <div id="dashboard-screen" class="screen view-active">
        <div class="dashboard-layout" style="grid-template-columns: 80px 1fr;">
            
            <!-- 좌측 사이드바 -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <span class="logo-text">CD</span>
                </div>
                <nav class="nav-menu">
                    <!-- 대시보드(차트) 홈 버튼 -->
                    <button class="nav-item" title="차트 보드" onclick="window.location.href='dashboard.html'">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    </button>
                    <!-- 투자 내역 (포트폴리오) 버튼 -->
                    <button class="nav-item" title="투자 내역" onclick="window.location.href='investment.html'">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
                    </button>
                    <!-- 커뮤니티 (게시판) 버튼 -->
                    <button class="nav-item active" title="커뮤니티" onclick="window.location.href='board.html'">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    </button>
                    <!-- 마이페이지 이동 버튼 -->
                    <button class="nav-item" title="마이페이지" onclick="window.location.href='mypage.html'">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </button>
                </nav>
                <div class="sidebar-footer">
                    <button id="logout-btn" class="nav-item" title="로그아웃"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
                </div>
            </aside>

            <!-- 메인 콘텐츠 영역 -->
            <main class="main-content" style="padding: 3rem; background-color: var(--bg-color); height: 100vh; overflow-y: auto;">
                <header class="main-header" style="margin-bottom: 2rem;">
                    <div class="header-left">
                        <h1 style="color: var(--text-main); font-size: 1.8rem; font-weight: 700;">커뮤니티</h1>
                        <p style="color: var(--text-muted); margin-top: 0.5rem; font-size: 1rem;">다양한 투자자들과 의견을 나누고 정보를 공유하세요.</p>
                    </div>
                </header>

                <div class="board-container">
                    <div class="board-header">
                        <div class="board-title">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                            자유 게시판
                        </div>
                        <button class="write-btn" id="open-write-modal-btn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                            글쓰기
                        </button>
                    </div>
                    <table class="board-list">
                        <thead>
                            <tr>
                                <th style="width: 60%;">제목</th>
                                <th style="width: 20%;">작성자</th>
                                <th style="width: 20%; text-align: right;">작성일</th>
                            </tr>
                        </thead>
                        <tbody id="board-list-body">
                            <!-- JS로 동적 렌더링 -->
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <!-- 글쓰기/상세보기 모달 레이어 -->
    <div class="modal-overlay" id="board-modal-overlay">
        <div class="board-modal">
            <div class="modal-header">
                <div class="modal-title" id="modal-title">새 게시글 작성</div>
                <button class="modal-close" id="modal-close-btn">&times;</button>
            </div>
            
            <!-- 글쓰기/수정 폼 -->
            <div class="modal-body" id="modal-form-view">
                <div class="form-group">
                    <label class="form-label">제목</label>
                    <input type="text" id="post-title-input" class="form-input" placeholder="게시글 제목을 입력하세요." autocomplete="off">
                </div>
                <div class="form-group">
                    <label class="form-label">내용</label>
                    <textarea id="post-content-input" class="form-textarea" placeholder="자유롭게 의견을 남겨주세요."></textarea>
                </div>
            </div>
            
            <!-- 글쓰기용 하단 (익명 토글 & 저장 버튼) -->
            <div class="modal-footer" id="modal-form-footer" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <label class="toggle-container" style="display: flex; align-items: center; gap: 0.8rem;">
                    <input type="checkbox" id="anon-toggle">
                    <div class="toggle-switch"></div>
                    <span class="toggle-label">익명 작성</span>
                </label>
                <button class="submit-btn" id="save-post-btn" style="margin-left: auto; flex: 0 0 auto; width: auto; min-width: 100px;">등록하기</button>
            </div>

            <!-- 상세보기 뷰 (목록에서 클릭 시) -->
            <div class="modal-body" id="modal-detail-view" style="display:none;">
                <div style="font-size:1.4rem; font-weight:700; color:var(--text-main); margin-bottom:1rem;" id="detail-title">제목</div>
                <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:1rem; margin-bottom:1.5rem;">
                    <div class="post-author" id="detail-author">작성자</div>
                    <div class="post-meta" id="detail-date">날짜</div>
                </div>
                <div style="color:var(--text-main); font-size:1rem; line-height:1.6; white-space:pre-wrap;" id="detail-content">내용</div>
            </div>
            
            <!-- 상세보기용 하단 (수정/삭제 버튼, 본인 글일때만) -->
            <div class="modal-footer" id="modal-detail-footer" style="display:none; justify-content:flex-end; gap:0.5rem;">
                <button class="submit-btn" style="background:transparent; border:1px solid var(--border-color); color:var(--text-main);" id="edit-post-btn">수정</button>
                <button class="submit-btn" style="background:transparent; border:1px solid #EF4444; color:#EF4444;" id="delete-post-btn">삭제</button>
            </div>
        </div>
    </div>

    <!-- 공통 로그인 세션 체크 스크립트 연결 -->
    <script src="js/app.js"></script>
    <script src="js/board.js"></script>
</body>
</html>
