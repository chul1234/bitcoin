<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가상 투자 대시보드</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- TradingView Lightweight Charts (버전 4.1.1로 고정하여 호환성 문제 완벽 해결) -->
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
    <div id="dashboard-screen" class="screen view-active">
        <div class="dashboard-layout">
            <!-- 좌측 사이드바 -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <span class="logo-text">CD</span>
                </div>
                <nav class="nav-menu">
                    <!-- 대시보드(차트) 홈 버튼 -->
                    <button class="nav-item active" title="차트 보드" onclick="window.location.href='dashboard.html'">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    </button>
                    <!-- 투자 내역 (포트폴리오) 버튼 -->
                    <button class="nav-item" title="투자 내역" onclick="window.location.href='investment.html'">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
                    </button>
                    <!-- 마이페이지 이동 버튼 -->
                    <button class="nav-item" title="마이페이지" onclick="window.location.href='mypage.html'">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </button>
                </nav>
                <div class="sidebar-footer">
                    <button id="logout-btn" class="nav-item" title="로그아웃"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
                </div>
            </aside>

            <!-- 메인 트레이딩 레이아웃 (3단 분할 대비) -->
            <div class="trading-layout">
                
                <!-- 좌측 코인 목록 패널 (업비트 탭분리형) -->
                <aside class="coin-list-panel">
                    <!-- 마켓 탭 (원화 / 관심) -->
                    <div class="coin-market-tabs" id="market-tabs">
                        <div class="market-tab active" data-target="krw-market-list">원화</div>
                        <div class="market-tab" data-target="fav-market-list">관심</div>
                    </div>

                    <!-- 공통 코인 검색 영역 -->
                    <div class="search-box">
                        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text" id="coin-search-input" class="search-input" placeholder="코인명/심볼 검색" autocomplete="off">
                    </div>
                    
                    <!-- 코인 리스트 분류 헤더 -->
                    <div class="list-header-row">
                        <div class="col-name">코인명</div>
                        <div class="col-price">현재가</div>
                        <div class="col-change">등락률</div>
                    </div>

                    <!-- 원화 마켓 리스트 컨테이너 -->
                    <div class="coin-list-container active" id="krw-market-list">
                        <!-- coinList.js가 이곳을 채웁니다 -->
                        <div style="text-align:center; padding:2rem; color:var(--text-muted); font-size: 0.9rem;">
                            실시간 데이터를 불러오는 중...
                        </div>
                    </div>

                    <!-- 관심 코인 리스트 컨테이너 -->
                    <div class="coin-list-container" id="fav-market-list" style="display: none;">
                        <!-- 비어있을 때 안내 문구 -->
                        <div style="text-align:center; padding:4rem 0; color:var(--text-muted); font-size: 0.9rem; line-height: 1.5;">
                            등록된 관심 코인이 없습니다.<br>
                            <span style="font-size:0.8rem; opacity:0.7;">원화 마켓에서 별(☆)을 눌러 등록해보세요.</span>
                        </div>
                    </div>
                </aside>

                <!-- 중앙 차트 패널 -->
                <main class="chart-panel">
                    <header class="main-header">
                        <div class="coin-info">
                            <span class="coin-name" id="display-coin-name">비트코인</span>
                            <span class="coin-symbol" id="display-coin-symbol">KRW-BTC</span>
                        </div>
                        <div class="current-price-group">
                            <span id="live-price" class="price-value">로딩 중...</span>
                            <span id="price-change" class="price-change">0.00%</span>
                        </div>
                    </header>
                    <div id="chart-container" class="chart-wrapper">
                        <!-- 차트가 여기에 렌더링됩니다 -->
                    </div>
                    
                    <!-- 호가창이 들어갈 임시 자리 (추후 구현) -->
                    <div id="orderbook-placeholder" style="display:none;"></div>
                </main>
                
                <!-- 우측 매수/매도 시스템 패널 -->
                <aside class="order-panel">
                    <div class="panel-header">
                        <h2>주문 (Order)</h2>
                    </div>
                    
                    <div class="order-type-tabs" id="order-tabs">
                        <div class="order-tab active" data-target="buy-panel">매수</div>
                        <div class="order-tab" data-target="sell-panel">매도</div>
                        <div class="order-tab" data-target="history-panel">거래내역</div>
                    </div>

                    <!-- 매수(Buy) 패널 -->
                    <div id="buy-panel" class="order-form-container active" style="display: block;">
                        <div class="order-form">
                            <div class="form-row">
                                <span>주문구분</span>
                                <div style="display:flex; gap:0.5rem; flex-wrap: wrap;">
                                    <label style="display:flex; align-items:center; gap:0.25rem; font-weight:600; color:var(--text-main); cursor:pointer; font-size:0.85rem;">
                                        <input type="radio" name="buyOrderType" value="limit" checked> 지정가
                                    </label>
                                    <label style="display:flex; align-items:center; gap:0.25rem; font-weight:600; color:var(--text-main); cursor:pointer; font-size:0.85rem;">
                                        <input type="radio" name="buyOrderType" value="market"> 시장가
                                    </label>
                                    <label style="display:flex; align-items:center; gap:0.25rem; font-weight:600; color:var(--text-main); cursor:pointer; font-size:0.85rem;">
                                        <input type="radio" name="buyOrderType" value="stop_limit"> 예약-지정가
                                    </label>
                                </div>
                            </div>

                            <div class="form-row" style="margin-top: 0.5rem;">
                                <span>주문가능</span>
                                <span style="color:var(--text-main); font-weight:700;">0 <span style="font-size:0.8rem; color:var(--text-muted);">KRW</span></span>
                            </div>

                            <!-- 감시가 (예약-지정가일 때만 노출) -->
                            <div class="order-input-group trigger-price-row" style="display: none; border-color: rgba(239, 68, 68, 0.4);">
                                <input type="number" placeholder="감시가 (발동 가격)" class="trigger-input">
                                <span class="unit">KRW</span>
                            </div>

                            <div class="order-input-group">
                                <input type="number" placeholder="0 (주문 가격)" class="price-input">
                                <span class="unit">KRW</span>
                            </div>

                            <div class="order-input-group">
                                <input type="number" placeholder="0 (주문 수량)" class="amount-input">
                                <span class="unit">BTC</span>
                            </div>

                            <div class="order-percentages">
                                <button class="btn-percent">10%</button>
                                <button class="btn-percent">25%</button>
                                <button class="btn-percent">50%</button>
                                <button class="btn-percent">100%</button>
                            </div>

                            <div class="form-row" style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.05);">
                                <span>주문총액</span>
                                <span style="font-size: 1.2rem; font-weight: 700; color:var(--text-main);">0 <span style="font-size:0.8rem; color:var(--text-muted);">KRW</span></span>
                            </div>

                            <div class="trade-btn-group">
                                <button class="btn-buy" style="width:100%;">매수 (Buy)</button>
                            </div>
                            <!-- 최소 주문 금액 및 수수료 안내 -->
                            <div style="margin-top: 0.5rem; text-align: center; color: rgba(255, 255, 255, 0.4); font-size: 0.75rem; line-height: 1.4;">
                                최소주문금액: 5,000 KRW<br>수수료: 0.05%
                            </div>
                        </div>
                    </div>

                    <!-- 매도(Sell) 패널 -->
                    <div id="sell-panel" class="order-form-container" style="display: none;">
                        <div class="order-form">
                            <div class="form-row">
                                <span>주문구분</span>
                                <div style="display:flex; gap:0.5rem; flex-wrap: wrap;">
                                    <label style="display:flex; align-items:center; gap:0.25rem; font-weight:600; color:var(--text-main); cursor:pointer; font-size:0.85rem;">
                                        <input type="radio" name="sellOrderType" value="limit" checked> 지정가
                                    </label>
                                    <label style="display:flex; align-items:center; gap:0.25rem; font-weight:600; color:var(--text-main); cursor:pointer; font-size:0.85rem;">
                                        <input type="radio" name="sellOrderType" value="market"> 시장가
                                    </label>
                                    <label style="display:flex; align-items:center; gap:0.25rem; font-weight:600; color:var(--text-main); cursor:pointer; font-size:0.85rem;">
                                        <input type="radio" name="sellOrderType" value="stop_limit"> 예약-지정가
                                    </label>
                                </div>
                            </div>

                            <div class="form-row" style="margin-top: 0.5rem;">
                                <span>매도가능</span>
                                <span style="color:var(--text-main); font-weight:700;">0 <span style="font-size:0.8rem; color:var(--text-muted);">BTC</span></span>
                            </div>

                            <!-- 감시가 (예약-지정가일 때만 노출) -->
                            <div class="order-input-group trigger-price-row" style="display: none; border-color: rgba(59, 130, 246, 0.4);">
                                <input type="number" placeholder="감시가 (발동 가격)" class="trigger-input">
                                <span class="unit">KRW</span>
                            </div>

                            <div class="order-input-group">
                                <input type="number" placeholder="0 (주문 가격)" class="price-input">
                                <span class="unit">KRW</span>
                            </div>

                            <div class="order-input-group">
                                <input type="number" placeholder="0 (주문 수량)" class="amount-input">
                                <span class="unit">BTC</span>
                            </div>

                            <div class="order-percentages">
                                <button class="btn-percent">10%</button>
                                <button class="btn-percent">25%</button>
                                <button class="btn-percent">50%</button>
                                <button class="btn-percent">100%</button>
                            </div>

                            <div class="form-row" style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.05);">
                                <span>주문총액</span>
                                <span style="font-size: 1.2rem; font-weight: 700; color:var(--text-main);">0 <span style="font-size:0.8rem; color:var(--text-muted);">KRW</span></span>
                            </div>

                            <div class="trade-btn-group">
                                <button class="btn-sell" style="width:100%;">매도 (Sell)</button>
                            </div>
                            <!-- 최소 주문 금액 및 수수료 안내 -->
                            <div style="margin-top: 0.5rem; text-align: center; color: rgba(255, 255, 255, 0.4); font-size: 0.75rem; line-height: 1.4;">
                                최소주문금액: 5,000 KRW<br>수수료: 0.05%
                            </div>
                        </div>
                    </div>

                    <!-- 거래내역(History) 패널 -->
                    <div id="history-panel" class="order-form-container" style="display: none;">
                        <div class="order-form" style="text-align: center; color: var(--text-muted); padding-top: 3rem;">
                            아직 거래 내역이 없습니다.
                        </div>
                    </div>
                </aside>
            </div>
        </div>
    </div>

    <!-- 차트, 코인리스트, 주문 컨트롤 로직 연결 -->
    <script src="js/chart.js?v=4"></script>
    <script src="js/coinList.js?v=1"></script>
    <script src="js/order.js?v=1"></script>
</body>
</html>
