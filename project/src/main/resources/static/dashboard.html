<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가상 투자 대시보드</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- TradingView Lightweight Charts (버전 4.1.1로 고정하여 호환성 문제 완벽 해결) -->
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
    <div id="dashboard-screen" class="screen view-active">
        <div class="dashboard-layout">
            <!-- 좌측 사이드바 -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <span class="logo-text">CD</span>
                </div>
                <nav class="nav-menu">
                    <button class="nav-item active" title="차트"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></button>
                </nav>
                <div class="sidebar-footer">
                    <button id="logout-btn" class="nav-item" title="로그아웃"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
                </div>
            </aside>

            <!-- 메인 트레이딩 레이아웃 (3단 분할 대비) -->
            <div class="trading-layout">
                
                <!-- 좌측 코인 목록 패널 (2단계) -->
                <aside class="coin-list-panel">
                    <div class="panel-header">
                        <h2>원화(KRW) 마켓</h2>
                    </div>
                    <!-- 신규: 코인 검색 영역 -->
                    <div class="search-box">
                        <input type="text" id="coin-search-input" class="search-input" placeholder="코인명 또는 심볼 검색" autocomplete="off">
                    </div>
                    <!-- coinList.js가 이곳에 코인 항목들을 렌더링함 -->
                    <div class="coin-list-container" id="coin-list-container">
                        <div style="text-align:center; padding:2rem; color:var(--text-muted);">
                            로딩 중...
                        </div>
                    </div>
                </aside>

                <!-- 중앙 차트 패널 -->
                <main class="chart-panel">
                    <header class="main-header">
                        <div class="coin-info">
                            <span class="coin-name" id="display-coin-name">비트코인</span>
                            <span class="coin-symbol" id="display-coin-symbol">KRW-BTC</span>
                        </div>
                        <div class="current-price-group">
                            <span id="live-price" class="price-value">로딩 중...</span>
                            <span id="price-change" class="price-change">0.00%</span>
                        </div>
                    </header>
                    <div id="chart-container" class="chart-wrapper">
                        <!-- 차트가 여기에 렌더링됩니다 -->
                    </div>
                    
                    <!-- 호가창이 들어갈 임시 자리 (추후 구현) -->
                    <div id="orderbook-placeholder" style="display:none;"></div>
                </main>
                
                <!-- 우측 매수/매도 시스템 패널은 현재 보이지 않게 처리 (추후 구현) -->
            </div>
        </div>
    </div>

    <!-- 차트 및 리스트 스크립트 (캐시 무효화 포함) -->
    <script src="js/chart.js?v=4"></script>
    <script src="js/coinList.js?v=1"></script>
</body>
</html>
