<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비트코인 대시보드 - 로그인</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 1. 로그인 화면 -->
    <div id="login-screen" class="screen view-active">
        <div class="login-card">
            <h1 class="logo-title">Crypto Dash</h1>
            <p class="subtitle">지능형 가상 투자 대시보드</p>
            
            <div id="alert-box" class="alert-box hidden">입력 정보가 올바르지 않습니다.</div>

            <form id="login-form">
                <div class="input-group">
                    <label for="userId">아이디</label>
                    <input type="text" id="userId" placeholder="아이디를 입력하세요 (ex. admin)" required autocomplete="off">
                </div>
                
                <div class="input-group">
                    <label for="userPw">비밀번호</label>
                    <input type="password" id="userPw" placeholder="비밀번호를 입력하세요" required>
                </div>
                
                <!-- 중복 방지를 위해 클릭 시 비활성화될 버튼 -->
                <button type="submit" id="login-btn" class="primary-btn">로그인</button>
            </form>
        </div>
    </div>

    <!-- 2. 성공 후 인트로 화면 -->
    <div id="intro-screen" class="screen hidden">
        <div class="intro-content">
            <div class="spinner"></div>
            <h2 id="welcome-text">환영합니다!</h2>
            <p>개인화된 실시간 투자 데이터를 불러오는 중입니다...</p>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
