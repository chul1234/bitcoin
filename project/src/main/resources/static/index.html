<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비트코인 대시보드 - 로그인</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 1. 로그인 화면 -->
    <div id="login-screen" class="screen view-active">
        <div class="login-card">
            <h1 class="logo-title">Crypto Dash</h1>
            <p class="subtitle">지능형 가상 투자 대시보드</p>
            
            <div id="alert-box" class="alert-box hidden">입력 정보가 올바르지 않습니다.</div>

            <form id="login-form">
                <div class="input-group">
                    <label for="userId">아이디</label>
                    <input type="text" id="userId" placeholder="아이디를 입력하세요" required autocomplete="off">
                </div>
                
                <div class="input-group">
                    <label for="userPw">비밀번호</label>
                    <input type="password" id="userPw" placeholder="비밀번호를 입력하세요" required>
                </div>
                
                <button type="submit" id="login-btn" class="primary-btn">로그인</button>
            </form>
            <p class="toggle-text">계정이 없으신가요? <a href="#" id="to-signup">회원가입</a></p>
        </div>
    </div>

    <div id="signup-screen" class="screen hidden">
        <div class="login-card">
            <!-- 뒤로 가기 버튼 추가 -->
            <button id="back-to-login" class="back-link-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                돌아가기
            </button>

            <h1 class="logo-title">Join Crypto Dash</h1>
            <p class="subtitle">새로운 투자 여정을 시작하세요</p>
            
            <div id="signup-alert-box" class="alert-box hidden">정보를 모두 입력해 주세요.</div>

            <form id="signup-form">
                <div class="input-group">
                    <label for="regUserId">아이디</label>
                    <input type="text" id="regUserId" placeholder="사용할 아이디" required autocomplete="off">
                </div>
                
                <div class="input-group">
                    <label for="regUserPw">비밀번호</label>
                    <input type="password" id="regUserPw" placeholder="비밀번호" required>
                </div>

                <div class="input-group">
                    <label for="regUserName">이름</label>
                    <input type="text" id="regUserName" placeholder="사용자 이름" required autocomplete="off">
                </div>

                <div class="input-group">
                    <label for="regUserEmail">이메일</label>
                    <input type="email" id="regUserEmail" placeholder="example@email.com" required autocomplete="off">
                </div>
                
                <button type="submit" id="signup-btn" class="primary-btn">가입하기</button>
            </form>
            <p class="toggle-text">이미 계정이 있으신가요? <a href="#" id="to-login">로그인</a></p>
        </div>
    </div>

    <!-- 2. 성공 후 인트로 화면 -->
    <div id="intro-screen" class="screen hidden">
        <div class="intro-content">
            <div class="spinner"></div>
            <h2 id="welcome-text">환영합니다!</h2>
            <p>실시간 암호화폐 시장 데이터를 불러오는 중입니다...</p>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
