<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지 - 가상 투자 대시보드</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/mypage.css">
</head>
<body>
    <div id="dashboard-screen" class="screen view-active">
        <div class="dashboard-layout" style="grid-template-columns: 80px 1fr;"> <!-- 마이페이지는 코인목록 사이드바 안씀 -->
            
            <!-- 좌측 네비게이션 -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <span class="logo-text">CD</span>
                </div>
                <nav class="nav-menu">
                    <button class="nav-item" title="차트 보드" onclick="window.location.href='dashboard.html'">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    </button>
                    <!-- 투자 내역 (포트폴리오) 버튼 -->
                    <button class="nav-item" title="투자 내역" onclick="window.location.href='investment.html'">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
                    </button>
                    <button class="nav-item active" title="마이페이지" onclick="window.location.href='mypage.html'">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </button>
                </nav>
                <div class="sidebar-footer">
                    <button id="logout-btn" class="nav-item" title="로그아웃"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
                </div>
            </aside>

            <!-- 마이페이지 콘텐츠 영역 -->
            <main class="profile-container">
                <header class="profile-header">
                    <h1>마이페이지</h1>
                    <p>내 계정 정보 조회 및 개인정보 수정 관리</p>
                </header>

                <div class="alert-box hidden" id="mypage-alert-box"></div>

                <div class="alert-box hidden" id="mypage-alert-box"></div>
                <div class="info-card">
                    <!-- 이름 -->
                    <div class="info-row">
                        <div class="info-row-display">
                            <span class="info-label">이름</span>
                            <span class="info-value" id="profile-name">로딩 중...</span>
                            <button class="btn-inline-edit invisible" disabled>수정</button>
                        </div>
                    </div>

                    <!-- 아이디 -->
                    <div class="info-row">
                        <div class="info-row-display">
                            <span class="info-label">아이디</span>
                            <span class="info-value" id="profile-userid">로딩 중...</span>
                            <button class="btn-inline-edit" onclick="openDynamicModal('userid')">수정</button>
                        </div>
                    </div>

                    <!-- 비밀번호 -->
                    <div class="info-row">
                        <div class="info-row-display">
                            <span class="info-label">비밀번호</span>
                            <span class="info-value">********</span>
                            <button class="btn-inline-edit" onclick="openDynamicModal('password')">수정</button>
                        </div>
                    </div>

                    <!-- 이메일 -->
                    <div class="info-row">
                        <div class="info-row-display">
                            <span class="info-label">이메일</span>
                            <span class="info-value" id="profile-email">로딩 중...</span>
                            <button class="btn-inline-edit" onclick="openDynamicModal('email')">수정</button>
                        </div>
                    </div>

                    <!-- 가입 일자 -->
                    <div class="info-row">
                        <div class="info-row-display">
                            <span class="info-label">가입 일자</span>
                            <span class="info-value" id="profile-created">로딩 중...</span>
                            <button class="btn-inline-edit invisible" disabled>수정</button>
                        </div>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="btn-delete" id="btn-delete-account" style="width: 100%;">회원 탈퇴</button>
                </div>
            </main>
        </div>
    </div>

    <!-- 범용 동적 모달: 각 버튼 클릭 시 내용이 바뀜 -->
    <div id="dynamic-modal-overlay" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">수정하기</h2>
                <button class="btn-close-modal" onclick="closeDynamicModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="alert-box hidden" id="modal-alert-box"></div>
                
                <!-- 동적으로 바뀔 Input 그룹 컨테이너 -->
                <div id="modal-input-container">
                    <!-- JS에서 주입됨 -->
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-modal-cancel" onclick="closeDynamicModal()">취소</button>
                <button type="button" class="btn-modal-save" onclick="saveDynamicModal()">변경</button>
            </div>
        </div>
    </div>

    <!-- 기능 스크립트 연결 -->
    <script src="js/mypage.js?v=4"></script>
</body>
</html>
