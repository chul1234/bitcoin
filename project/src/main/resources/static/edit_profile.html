<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정보 수정 - 가상 투자 대시보드</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .edit-container {
            flex: 1;
            padding: 3rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            background-color: var(--bg-color);
            overflow-y: auto;
        }

        .edit-header {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 2rem;
        }

        .edit-header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .edit-header p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .edit-form-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-width: 600px;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .btn-cancel {
            flex: 1;
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            text-decoration: none;
        }

        .btn-cancel:hover { background-color: rgba(255, 255, 255, 0.05); }

        .btn-save {
            flex: 1;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-save:hover { background-color: var(--accent-hover); }
        .btn-save:disabled { background-color: #64748B; cursor: not-allowed; opacity: 0.7; }
    </style>
</head>
<body>
    <div id="dashboard-screen" class="screen view-active">
        <div class="dashboard-layout" style="grid-template-columns: 80px 1fr;"> 
            
            <!-- 좌측 네비게이션 -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <span class="logo-text">CD</span>
                </div>
                <nav class="nav-menu">
                    <button class="nav-item" title="차트 보드" onclick="window.location.href='dashboard.html'">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    </button>
                    <button class="nav-item active" title="마이페이지" onclick="window.location.href='mypage.html'">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </button>
                </nav>
            </aside>

            <!-- 수정 폼 콘텐츠 영역 -->
            <main class="edit-container">
                <header class="edit-header">
                    <h1>회원 정보 수정</h1>
                    <p>보안을 위해 수정하지 않을 항목은 빈칸으로 두세요.</p>
                </header>

                <div class="edit-form-card">
                    <div class="alert-box hidden" id="edit-alert-box"></div>

                    <form id="edit-profile-form">
                        <!-- 변경할 아이디 -->
                        <div class="input-group">
                            <label for="editUserId">로그인 아이디 (변경을 원할 때만 입력)</label>
                            <input type="text" id="editUserId" placeholder="새로운 아이디 입력 (선택)">
                        </div>

                        <!-- 변경할 비밀번호 -->
                        <div class="input-group">
                            <label for="editPassword">새로운 비밀번호</label>
                            <input type="password" id="editPassword" placeholder="영문/숫자 포함 8자 이상 (선택)">
                        </div>

                        <!-- 변경할 이메일 -->
                        <div class="input-group">
                            <label for="editEmail">이메일 변경</label>
                            <input type="email" id="editEmail" placeholder="새로운 이메일 주소 (선택)">
                        </div>

                        <div class="action-buttons">
                            <a href="mypage.html" class="btn-cancel">취소 및 돌아가기</a>
                            <button type="submit" class="btn-save" id="btn-save-profile">변경사항 저장</button>
                        </div>
                    </form>
                </div>
            </main>
        </div>
    </div>

    <!-- 기능 스크립트 연결 -->
    <script src="js/mypage.js?v=2"></script>
</body>
</html>
